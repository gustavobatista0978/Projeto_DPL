<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora de Jogos Digital</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 2rem;
            max-width: 700px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 0.8rem;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e2e8f0;
        }

        .actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 0.8rem 1.2rem;
            border-radius: 999px;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #38bdf8;
            color: #082f49;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #38bdf8;
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <main class="hero">
        <section class="card">
            <h1>Locadora de Jogos Digital</h1>
            <p>Explore o catálogo, encontre seus jogos favoritos e faça o aluguel de forma rápida e prática.</p>
            <li>
                <p>God of War Ragnarök</p>
                <p>Halo Infinite</p>
                <p>Zelda Tears of the Kingdom</p>
                <p>Spider-Man 2</p>
                <p>Forza Horizon 5</p>
            </li>
        </section>
    </main>
</body>
</html>
