<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aluguel de Jogos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            background: #f4f4f4;
            color: #222;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-weight: bold;
        }

        input, button {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.4rem;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            margin-top: 1.2rem;
            background: #2c7be5;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1f63b8;
        }

        #mensagem {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 6px;
            display: none;
        }

        .sucesso {
            background: #dff6dd;
            color: #1f5f2f;
        }

        .erro {
            background: #fde2e2;
            color: #a61b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Alugar Jogo</h1>
        <form id="form-aluguel">
            <label for="id">ID do Jogo</label>
            <input type="number" id="id" name="id" required>

            <label for="cliente">Nome do Cliente</label>
            <input type="text" id="cliente" name="cliente" required>

            <button type="submit">Alugar</button>
        </form>

        <div id="mensagem"></div>
    </div>

    <script>
        const form = document.getElementById('form-aluguel');
        const mensagem = document.getElementById('mensagem');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const id = Number(document.getElementById('id').value);
            const cliente = document.getElementById('cliente').value;

            try {
                const response = await fetch('/aluguel', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ id, cliente })
                });

                const dados = await response.json();

                mensagem.style.display = 'block';
                mensagem.className = response.ok ? 'sucesso' : 'erro';
                mensagem.textContent = dados.mensagem || 'Erro ao processar aluguel.';
            } catch (error) {
                mensagem.style.display = 'block';
                mensagem.className = 'erro';
                mensagem.textContent = 'Não foi possível conectar ao servidor.';
            }
        });
    </script>
</body>
</html>
